<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Login y Registro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">



</head>

<body>

<div class="card p-4">

    <!-- LOGIN -->
    <div id="loginBox">
        <h4 class="text-center">Login</h4>

        <input type="email" id="loginCorreo" class="form-control mb-2" placeholder="Correo">
        <input type="password" id="loginPassword" class="form-control mb-2" placeholder="Contraseña">

        <button id="btnLogin" class="btn btn-success w-100">Ingresar</button>

        <p class="text-center mt-2">
            ¿No tienes cuenta? 
            <a href="#" id="irRegistro">Regístrate</a>
        </p>
    </div>

    <!-- REGISTRO -->
    <div id="registroBox" style="display:none;">
        <h4 class="text-center">Registro</h4>

        <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre">
        <input type="email" id="correo" class="form-control mb-2" placeholder="Correo">
        <input type="password" id="password" class="form-control mb-2" placeholder="Contraseña">
        <input type="password" id="confirmPassword" class="form-control mb-2" placeholder="Confirmar contraseña">

        <button id="btnRegistro" class="btn btn-primary w-100">Registrarse</button>

        <p class="text-center mt-2">
            ¿Ya tienes cuenta? 
            <a href="#" id="irLogin">Inicia sesión</a>
        </p>
    </div>

    <div id="mensaje" class="mt-2">Este es un mensaje</div>

</div>


</body>
</html>
